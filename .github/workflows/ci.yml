name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  mdconv-cfwk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mdconv-cfwk
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - run: corepack enable

      - run: pnpm install --frozen-lockfile

      - run: pnpm run cf-typegen

      - run: pnpm test -- --run

  readability-js:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: readability-js
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - run: corepack enable

      - run: pnpm install --frozen-lockfile

      - run: pnpm run smoke

  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - readability-py
          - trafilatura-py
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version-file: ${{ matrix.project }}/.python-version

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true

      - run: uv sync --frozen

      - run: uv run python -m compileall main.py
