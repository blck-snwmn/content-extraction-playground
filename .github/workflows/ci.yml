name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  mdconv-cfwk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mdconv-cfwk
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: mdconv-cfwk/package.json

      - run: corepack enable

      - run: pnpm install --frozen-lockfile

      - run: pnpm run cf-typegen

      - run: pnpm test -- --run

  readability-js:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: readability-js
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: readability-js/package.json

      - run: corepack enable

      - run: pnpm install --frozen-lockfile

      - run: pnpm run smoke

  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - readability-py
          - trafilatura-py
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: ${{ matrix.project }}/.python-version

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - run: uv sync --frozen

      - run: uv run python -m compileall main.py

      - name: Run readability smoke
        if: matrix.project == 'readability-py'
        run: uv run python -c "from readability import Document; Document('<html><title>x</title><body>hello</body></html>').summary()"

      - name: Run trafilatura smoke
        if: matrix.project == 'trafilatura-py'
        run: uv run python -c "from trafilatura import extract; assert extract('<html><body>hello</body></html>')"
